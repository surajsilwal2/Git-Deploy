name: CI/CD Pipeline

on: 
    push:
        branches:
            - main 
    pull_request:
        branches:
            - main
    schedule:
        - cron: '0 0 * * *' # Runs every day at midnight
    workflow_dispatch: # Manual trigger button in GitHub Actions UI
jobs:
    demo:
        runs-on: ubuntu-latest
        steps:
            - name: Demo step
              run: echo "Workflow triggered successfully!"
